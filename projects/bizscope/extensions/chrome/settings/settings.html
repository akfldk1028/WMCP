<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BizScope AI 설정</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      max-width: 560px;
      margin: 40px auto;
      background: #0f0f17;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 24px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }

    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      margin-bottom: 10px;
    }
    input:focus { border-color: rgba(99,102,241,0.5); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: #aaa; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 8px;
    }
    .status-valid { background: rgba(34,197,94,0.1); color: #22c55e; }
    .status-invalid { background: rgba(239,68,68,0.1); color: #ef4444; }
    .status-checking { background: rgba(234,179,8,0.1); color: #eab308; }

    .actions { display: flex; gap: 8px; align-items: center; }
    .info { font-size: 11px; color: #555; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>BizScope AI 설정</h1>
  <p class="subtitle">Chrome 확장 설정 관리</p>

  <!-- License Key -->
  <div class="section">
    <h2>라이선스 키</h2>
    <label>License Key</label>
    <input type="text" id="licenseKeyInput" placeholder="BSAI-XXXX-XXXX-XXXX">
    <div class="actions">
      <button class="btn btn-primary" id="saveLicenseBtn">저장 및 검증</button>
      <button class="btn btn-danger" id="removeLicenseBtn">제거</button>
    </div>
    <div id="licenseStatusMsg"></div>
    <p class="info">
      라이선스 키는 <a href="https://bizscope-rho.vercel.app/pricing" target="_blank" style="color:#6366f1;">가격 페이지</a>에서 구매할 수 있습니다.
      Free 플랜은 2건 무료 분석이 포함됩니다.
    </p>
  </div>

  <!-- Server URL -->
  <div class="section">
    <h2>서버 URL</h2>
    <label>BizScope API URL</label>
    <input type="url" id="serverUrlInput" placeholder="https://bizscope-rho.vercel.app">
    <button class="btn btn-ghost" id="saveUrlBtn">저장</button>
    <p class="info">기본값: https://bizscope-rho.vercel.app (변경 불필요)</p>
  </div>

  <!-- Stats -->
  <div class="section">
    <h2>사용 통계</h2>
    <div id="stats" style="font-size: 12px; color: #888;">로딩 중...</div>
    <button class="btn btn-ghost" id="resetStatsBtn" style="margin-top: 10px;">통계 초기화</button>
  </div>

  <script src="../dist/settings.js"></script>
</body>
</html>
